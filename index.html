<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Randy Meaney — Handmade Jewelry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="social-icons" id="header-social"></div>
    <button class="cart-icon-btn" id="cart-icon-btn" aria-label="Open cart">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 7h-3V6a4 4 0 0 0-8 0v1H5a1 1 0 0 0-1 1l-1 12a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1L20 8a1 1 0 0 0-1-1zm-9-1a2 2 0 0 1 4 0v1h-4zm6 5a1 1 0 1 1-2 0v-1h2zm-6 0a1 1 0 1 1-2 0v-1h2z"/></svg>
      <span class="cart-count" id="cart-count" style="display:none">0</span>
    </button>
    <div class="header-inner">
      <div class="logo-row">
        <div class="title-block">
          <h1><img src="cat.png" class="cat-graphic" alt="" aria-hidden="true">Randy Meaney</h1>
          <p class="location-subtitle"><span class="location-heart">♥</span> Santa Barbara, CA</p>
          <p class="tagline">
            sweet, fun, slightly wacky, usually happy<br>
            handmade jewelry, knits, yarn, and other things
          </p>
        </div>
      </div>
      <nav>
        <a href="/">Shop</a>
        <a href="/about">About</a>
        <a href="/events">Upcoming Events</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ===== SHOP SECTION ===== -->
    <section id="shop">
      <div class="shop-ornament">
        <span class="shop-ornament-line"></span>
        <span class="shop-ornament-glyph">✦</span>
        <span class="shop-ornament-line"></span>
      </div>

      <div class="this-month-heading" id="this-month-heading" style="display:none">
        <span class="this-month-label">Now Showing</span><span class="this-month-ellipsis">…</span>
      </div>

      <div class="products-grid" id="products-grid">
        <p class="grid-message">Loading shop...</p>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="email-signup">
      <p class="email-signup-text">Sign up for my email and I'll shoot you a note when I put new things on the site.</p>
      <form class="email-signup-form" id="email-signup-form">
        <input type="email" class="email-signup-input" id="email-signup-input" placeholder="Your email address" required />
        <button type="submit" class="email-signup-btn">Subscribe</button>
      </form>
      <p class="email-signup-msg" id="email-signup-msg"></p>
    </div>
    <p>© <span id="footer-year"></span> Randy Meaney</p>
    <a href="/admin" class="admin-link">Admin</a>
    <p class="site-version" id="site-version"></p>
  </footer>

  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
  <script src="js/main.js"></script>
  <script src="js/version.js"></script>
  <script src="js/subscribe.js"></script>
</body>
</html>
