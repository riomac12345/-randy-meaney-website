<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Randy Meaney — Handmade Jewelry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="social-icons" id="header-social"></div>
    <button class="cart-icon-btn" id="cart-icon-btn" aria-label="Open cart">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 7h-3V6a4 4 0 0 0-8 0v1H5a1 1 0 0 0-1 1l-1 12a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1L20 8a1 1 0 0 0-1-1zm-9-1a2 2 0 0 1 4 0v1h-4zm6 5a1 1 0 1 1-2 0v-1h2zm-6 0a1 1 0 1 1-2 0v-1h2z"/></svg>
      <span class="cart-count" id="cart-count" style="display:none">0</span>
    </button>
    <div class="header-inner">
      <div class="logo-row">
        <img class="cat-logo" src="cat.png" alt="Cat illustration" />
        <div class="title-block">
          <h1>Randy Meaney</h1>
          <p class="tagline">
            sweet, fun, slightly wacky, usually happy<br>
            handmade jewelry, knits, yarn, and other things
          </p>
        </div>
      </div>
      <nav>
        <a href="/">Shop</a>
        <a href="/about">About</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ===== SHOP SECTION ===== -->
    <section id="shop">
      <h2 class="section-title">Handmade with Love</h2>
      <p class="section-subtitle">Each piece is one-of-a-kind, made right here at home.</p>

      <div class="filter-bar" id="filter-bar" style="display:none">
        <button class="filter-btn active" data-cat="All">All</button>
      </div>

      <div class="products-grid" id="products-grid">
        <p class="grid-message">Loading shop...</p>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>© 2024 Randy Meaney &nbsp;·&nbsp; Handmade with love</p>
    <a href="/admin" class="admin-link">Admin</a>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
