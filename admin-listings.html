<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Listings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- ===== PASSWORD SCREEN ===== -->
  <div id="password-screen" class="password-screen">
    <div class="password-box">
      <img src="cat.png" alt="Cat illustration" style="height:100px;width:auto;" />
      <h2>Shop Manager</h2>
      <p>Enter your password to update your shop</p>
      <input type="password" id="password-input" class="admin-input-large"
             placeholder="Enter password" autocomplete="current-password" />
      <button id="login-btn" class="login-btn">Log In</button>
      <p id="login-error" class="error-msg" style="display:none">
        Wrong password. Please try again.
      </p>
    </div>
  </div>

  <!-- ===== ADMIN PANEL ===== -->
  <div id="admin-panel" style="display:none">

    <header class="admin-header">
      <h1>Randy Meaney — Shop Manager</h1>
      <div class="header-actions">
        <a href="/" class="view-site-btn">View My Site</a>
        <button id="save-btn" class="save-btn">Save All Changes</button>
        <button id="logout-btn" class="logout-btn">Log Out</button>
      </div>
    </header>

    <nav class="admin-page-nav">
      <a href="/admin-settings" class="admin-page-tab">Settings</a>
      <a href="/admin" class="admin-page-tab active">Listings</a>
    </nav>

    <main class="admin-main">

      <section class="products-section">
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--brown-dark);margin-bottom:6px;">Your Listings</h2>
        <p class="hint">Add as many listings as you like. Each one can have multiple photos.</p>

        <div class="admin-grid" id="admin-grid"></div>

        <div class="add-listing-section">
          <button id="add-listing-btn" class="add-listing-btn">+ Add New Listing</button>
        </div>
      </section>

    </main>

    <div id="save-notification" class="save-notification" style="display:none">
      Saved! Your listings have been updated.
    </div>
    <div id="loading-overlay" class="loading-overlay" style="display:none">
      Saving your changes...
    </div>

  </div>

  <script src="js/admin-listings.js"></script>
</body>
</html>
