<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You! — Randy Meaney</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .success-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .success-box {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 60px 50px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 8px 30px var(--shadow);
    }
    .success-icon { font-size: 4rem; margin-bottom: 20px; }
    .success-box h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      color: var(--brown-dark);
      margin-bottom: 16px;
    }
    .success-box p {
      color: var(--brown-mid);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .back-btn {
      display: inline-block;
      padding: 16px 42px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      transition: background 0.2s;
    }
    .back-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo-row">
        <img src="cat.png" alt="Cat illustration" style="height:90px;width:auto;" />
        <div class="title-block">
          <h1>Randy Meaney</h1>
        </div>
      </div>
    </div>
  </header>

  <div class="success-page">
    <div class="success-box">
      <div class="success-icon">&#10003;</div>
      <h1>Thank You So Much!</h1>
      <p>
        Your order is on its way to being loved. Each piece is handmade with care,
        and I'm so happy it's found a new home. You'll receive a confirmation email shortly.
      </p>
      <p style="font-style:italic;font-size:0.95rem;">— Randy</p>
      <a href="/" class="back-btn">Back to the Shop</a>
    </div>
  </div>

  <footer>
    <p>© <span id="footer-year"></span> Randy Meaney</p>
    <p class="site-version" id="site-version"></p>
  </footer>
  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
  <script src="js/version.js"></script>
</body>
</html>
